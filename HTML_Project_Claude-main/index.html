<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Processing Power</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/combat.css" />
  <link rel="stylesheet" href="css/mobile.css" />

  <!-- ── file:// protocol guard ── runs sync before any module loads ── -->
  <script>
    if (window.location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function () {
        // Freeze the page — modules won't load anyway
        document.body.style.cssText = 'margin:0;background:#0a0f0a;overflow:hidden;';

        var overlay = document.createElement('div');
        overlay.style.cssText = [
          'position:fixed;inset:0;display:flex;flex-direction:column',
          'align-items:center;justify-content:center;background:#0a0f0a',
          'font-family:monospace;color:#00ffcc;padding:32px;box-sizing:border-box',
          'z-index:99999;text-align:center'
        ].join(';');

        overlay.innerHTML = [
          '<div style="font-size:2rem;font-weight:bold;letter-spacing:4px;margin-bottom:8px">⚡ PROCESSING POWER</div>',
          '<div style="color:#558866;margin-bottom:32px;font-size:0.85rem;letter-spacing:2px">SCI-FI IDLE RPG</div>',

          '<div style="background:#0f1f14;border:1px solid #00ffcc44;border-radius:8px;padding:24px 32px;max-width:560px;width:100%;margin-bottom:24px">',
          '<div style="color:#ff6644;font-size:1rem;margin-bottom:16px;font-weight:bold">',
          '⚠ Cannot run from file://</div>',
          '<div style="color:#aaccbb;font-size:0.875rem;line-height:1.7">',
          'This game uses ES6 modules which browsers block when opened directly from disk.',
          '<br>It must be served via a local web server.</div>',
          '</div>',

          '<div style="background:#0f1f14;border:1px solid #00ffcc44;border-radius:8px;padding:24px 32px;max-width:560px;width:100%;text-align:left">',
          '<div style="color:#00ffcc;font-weight:bold;margin-bottom:14px;letter-spacing:1px">HOW TO PLAY</div>',

          '<div style="color:#aaccbb;font-size:0.875rem;line-height:2">',
          '<span style="color:#00ffcc">1.</span> Find <strong style="color:#fff">start.bat</strong> in the game folder<br>',
          '<span style="color:#00ffcc">2.</span> Double-click it — a terminal window will open<br>',
          '<span style="color:#00ffcc">3.</span> Open your browser and go to:<br>',
          '</div>',

          '<div style="background:#000;border:1px solid #00ffcc66;border-radius:4px;padding:10px 16px;margin:10px 0;font-size:1.1rem;letter-spacing:2px;color:#00ffff;text-align:center">',
          'http://localhost:8080',
          '</div>',

          '<div style="color:#558866;font-size:0.8rem;margin-top:10px">',
          'Requires Python (pre-installed on Windows 10/11).<br>',
          'No Python? Double-click <strong style="color:#aaa">start-node.bat</strong> instead (needs Node.js).',
          '</div>',
          '</div>'
        ].join('');

        document.body.appendChild(overlay);
      });
    }
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "./js/vendor/three.module.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="hud-topleft">
      <div id="zone-label">Landing Site</div>
      <div id="pp-display">PP: 0 <span id="pp-rate">(+1.0/s)</span></div>
      <div id="hp-display">HP: 100 / 100</div>
      <div id="steps-display">Steps: 0</div>
    </div>

    <!-- Interact hint + gather bar -->
    <div id="interact-hint" hidden>[E] Gather</div>
    <div id="gather-bar" hidden>
      <div id="gather-fill"></div>
      <div id="gather-text">Gathering...</div>
    </div>

    <!-- Panel toggle buttons (bottom-left) -->
    <div id="panel-buttons">
      <button id="btn-toggle-inventory-panel" class="panel-toggle-btn" title="Inventory (I)">INV</button>
      <button id="btn-toggle-drone-panel" class="panel-toggle-btn" title="Drones (R)">DRONE</button>
      <button id="btn-toggle-equipment-panel" class="panel-toggle-btn" title="Equipment (L)">EQUIP</button>
      <button id="btn-toggle-pedometer-panel" class="panel-toggle-btn" title="Steps Shop (P)">STEPS</button>
      <button id="btn-toggle-stat-sidebar" class="panel-toggle-btn" title="Stats (S)">STATS</button>
    </div>

    <!-- Stat sidebar (right) — toggled by STATS button or [S] key -->
    <div id="stat-sidebar" hidden>
      <div class="sidebar-title">STATS</div>
      <div id="stat-list"></div>
      <div class="sidebar-title" style="margin-top:12px;">PRESTIGE BONUS</div>
      <div id="prestige-display" style="font-size:0.6rem;color:#00ffcc;text-align:center;margin-bottom:4px;">+0.000 PP/s</div>
    </div>

    <!-- Inventory panel -->
    <div id="inventory-panel" class="game-panel" hidden>
      <div class="panel-header">INVENTORY <button class="panel-close" onclick="this.parentElement.parentElement.hidden=true">X</button></div>
      <div id="inventory-contents" class="panel-body"></div>
    </div>

    <!-- Crafting panel -->
    <div id="crafting-panel" class="game-panel" hidden>
      <div class="panel-header">CRAFTING <button class="panel-close" onclick="this.parentElement.parentElement.hidden=true">X</button></div>
      <div id="crafting-contents" class="panel-body"></div>
    </div>

    <!-- Drone panel -->
    <div id="drone-panel" class="game-panel" hidden>
      <div class="panel-header">DRONES <button class="panel-close" onclick="this.parentElement.parentElement.hidden=true">X</button></div>
      <div id="drone-contents" class="panel-body"></div>
    </div>

    <!-- Equipment panel -->
    <div id="equipment-panel" class="game-panel" hidden>
      <div class="panel-header">EQUIPMENT <button class="panel-close" onclick="this.parentElement.parentElement.hidden=true">X</button></div>
      <div id="equipment-contents" class="panel-body"></div>
    </div>

    <!-- Pedometer / Steps shop panel -->
    <div id="pedometer-panel" class="game-panel" hidden>
      <div class="panel-header">STEPS SHOP <button class="panel-close" onclick="this.parentElement.parentElement.hidden=true">X</button></div>
      <div id="pedometer-contents" class="panel-body"></div>
    </div>
  </div>

  <!-- Combat overlay -->
  <div id="combat-overlay" hidden>
    <div id="combat-scene">
      <div id="enemy-panel">
        <div id="enemy-name">SCRAPPER</div>
        <div id="enemy-hp-bar-wrap">
          <div class="hp-label">HP</div>
          <div class="hp-track"><div id="enemy-hp-fill" class="hp-fill enemy-fill"></div></div>
          <div id="enemy-hp-text">40 / 40</div>
        </div>
        <div id="enemy-sprite"></div>
      </div>

      <div id="player-combat-panel">
        <div id="player-combat-name">YOU</div>
        <div id="player-hp-bar-wrap">
          <div class="hp-label">HP</div>
          <div class="hp-track"><div id="player-hp-fill" class="hp-fill player-fill"></div></div>
          <div id="player-hp-text">100 / 100</div>
        </div>
        <div id="status-effects"></div>
        <div id="player-sprite-wrap">
          <div id="player-sprite"></div>
          <div id="fp-ring-wrap">
            <svg id="fp-ring-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle id="fp-ring-bg" cx="50" cy="50" r="40" fill="none" stroke="#1a2a2a" stroke-width="8"/>
              <circle id="fp-ring-fill" cx="50" cy="50" r="40" fill="none" stroke="#00ffcc" stroke-width="8"
                stroke-dasharray="251.3" stroke-dashoffset="251.3"
                transform="rotate(-90 50 50)" stroke-linecap="round"/>
            </svg>
            <div id="fp-text">0 FP</div>
          </div>
        </div>
      </div>
    </div>

    <div id="combat-log-wrap">
      <div id="combat-log"></div>
    </div>

    <div id="combat-actions">
      <button id="btn-fight" class="action-btn" onclick="window.combatUI.onFight()">FIGHT</button>
      <button id="btn-skills" class="action-btn" onclick="window.combatUI.onSkills()">SKILLS</button>
      <button id="btn-items" class="action-btn" onclick="window.combatUI.onItems()">ITEMS</button>
      <button id="btn-run" class="action-btn" onclick="window.combatUI.onRun()">RUN</button>
    </div>

    <!-- Skills submenu -->
    <div id="skills-menu" hidden>
      <div id="skills-list"></div>
      <button class="action-btn back-btn" onclick="window.combatUI.closeSkills()">BACK</button>
    </div>

    <!-- Items submenu -->
    <div id="items-menu" hidden>
      <div id="items-list"></div>
      <button class="action-btn back-btn" onclick="window.combatUI.closeItems()">BACK</button>
    </div>
  </div>

  <!-- Mobile controls overlay (touch devices only — shown via CSS) -->
  <div id="mobile-controls">
    <!-- Virtual joystick -->
    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-stick"></div>
    </div>
    <!-- Action / interact button -->
    <button id="btn-mobile-action" aria-label="Interact / Gather">
      <span class="act-label">ACT</span>
      <span class="act-sub">[E]</span>
    </button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
